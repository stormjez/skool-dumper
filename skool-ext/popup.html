<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 260px; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e; color: #fff; margin: 0; padding: 16px; box-sizing: border-box;
    }
    h2 { margin: 0 0 12px; font-size: 15px; color: #e94560; display: flex; align-items: center; gap: 8px; }
    #status { font-size: 12px; color: #888; margin-bottom: 12px; line-height: 1.5; }
    button {
      width: 100%; background: #e94560; color: #fff; border: none;
      border-radius: 6px; padding: 9px; font-size: 13px; font-weight: 600;
      cursor: pointer; margin-bottom: 6px;
    }
    button:disabled { background: #444; cursor: not-allowed; }
    .ok { color: #4ade80; }
    .warn { color: #facc15; }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <h2>🎬 Skool Dumper</h2>
  <div id="status">Controllo...</div>
  <button id="dl-btn" disabled>⬇️ Avvia download</button>
  <script src="popup.js"></script>
</body>
</html>
